# ===== API.GEO.Carbone — Render Blueprint =====
# Déployer via : https://render.com/deploy
#
# Base de données : EXTERNE (Neon — https://neon.tech), Postgres + PostGIS
# qui n'expire pas (contrairement au free-tier Render supprimé à 90 jours).
# DATABASE_URL doit être défini MANUELLEMENT dans le dashboard Render
# (Service > Environment) avec l'URL de connexion Neon
# (format: postgresql://USER:PASS@HOST/DB?sslmode=require).

services:
  - type: web
    name: api-geo-carbone
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.6"
      # Défini manuellement dans le dashboard (URL Neon) — non géré par le blueprint
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,api-geo-carbone.com,www.api-geo-carbone.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://api-geo-carbone.com,https://www.api-geo-carbone.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://api-geo-carbone.com,https://www.api-geo-carbone.com"
